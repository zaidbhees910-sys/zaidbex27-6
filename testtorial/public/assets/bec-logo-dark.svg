<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 192" fill="none">
  <defs>
    <!-- Triangle gradient: light cyan-blue at top → dark navy at bottom -->
    <linearGradient id="g-tri" x1="96" y1="6" x2="96" y2="182" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#bae6fd"/>
      <stop offset="18%"  stop-color="#38bdf8"/>
      <stop offset="55%"  stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>

    <!-- Diagonal gradient for 3-D depth on left edge -->
    <linearGradient id="g-tri2" x1="8" y1="182" x2="185" y2="6" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>

    <!-- BEC text gradient -->
    <linearGradient id="g-bec" x1="210" y1="30" x2="570" y2="155" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#38bdf8"/>
      <stop offset="30%"  stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>

    <!-- Subtitle text color -->
    <linearGradient id="g-sub" x1="215" y1="170" x2="560" y2="185" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>

    <!-- Glow filter for triangle and BEC text -->
    <filter id="f-glow" x="-12%" y="-12%" width="124%" height="124%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow for text only -->
    <filter id="f-text-glow" x="-5%" y="-5%" width="110%" height="115%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ═══════════ TRIANGLE RING ═══════════ -->

  <!-- Shadow / depth layer behind the triangle -->
  <polygon
    points="96,10 10,182 182,182"
    fill="none"
    stroke="#1e3a8a"
    stroke-width="30"
    stroke-linejoin="round"
    stroke-linecap="round"
    opacity="0.6"
  />

  <!-- Main triangle ring with gradient -->
  <polygon
    points="96,10 10,182 182,182"
    fill="none"
    stroke="url(#g-tri)"
    stroke-width="22"
    stroke-linejoin="round"
    stroke-linecap="round"
    filter="url(#f-glow)"
  />

  <!-- Secondary gradient overlay for 3D depth -->
  <polygon
    points="96,10 10,182 182,182"
    fill="none"
    stroke="url(#g-tri2)"
    stroke-width="22"
    stroke-linejoin="round"
    stroke-linecap="round"
    opacity="0.5"
  />

  <!-- Inner highlight line (3D glint effect) -->
  <polygon
    points="96,10 10,182 182,182"
    fill="none"
    stroke="rgba(255,255,255,0.45)"
    stroke-width="3.5"
    stroke-linejoin="round"
    stroke-linecap="round"
  />

  <!-- Outer edge highlight (subtle) -->
  <polygon
    points="96,10 10,182 182,182"
    fill="none"
    stroke="rgba(186,230,253,0.25)"
    stroke-width="1"
    stroke-linejoin="round"
    stroke-linecap="round"
  />

  <!-- ═══════════ BEC TEXT ═══════════ -->

  <!-- Text shadow for depth -->
  <text
    x="212" y="150"
    font-family="'Arial Black', 'Impact', 'Helvetica Neue', Arial, sans-serif"
    font-size="132"
    font-weight="900"
    fill="#1e3a8a"
    opacity="0.7"
    dx="3" dy="4"
  >BEC</text>

  <!-- Main BEC text -->
  <text
    x="212" y="150"
    font-family="'Arial Black', 'Impact', 'Helvetica Neue', Arial, sans-serif"
    font-size="132"
    font-weight="900"
    fill="url(#g-bec)"
    filter="url(#f-text-glow)"
  >BEC</text>

  <!-- ═══════════ SUBTITLE ═══════════ -->
  <text
    x="216" y="180"
    font-family="'Arial', 'Helvetica Neue', Helvetica, sans-serif"
    font-size="14"
    font-weight="700"
    fill="url(#g-sub)"
    letter-spacing="4.8"
    opacity="0.9"
  >BANYAS ELECTRONICS CO.</text>
</svg>
